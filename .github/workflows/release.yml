name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - profile: default
            suffix: ""
          - profile: minimal
            suffix: "-minimal"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download conctl binaries
        run: |
          curl -fsSL https://github.com/ConspiracyOS/conctl/releases/latest/download/conctl-linux-amd64 -o conctl-linux-amd64
          curl -fsSL https://github.com/ConspiracyOS/conctl/releases/latest/download/conctl-linux-arm64 -o conctl-linux-arm64
          chmod +x conctl-linux-*

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        run: |
          TAG="${GITHUB_REF_NAME}"
          IMAGE="ghcr.io/conspiracyos/conos${{ matrix.suffix }}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE=ubuntu:24.04 \
            --build-arg PROFILE=${{ matrix.profile }} \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            --push \
            -f Containerfile \
            .

      - name: Ensure package is public
        run: |
          PACKAGE="conos${{ matrix.suffix }}"
          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/ConspiracyOS/packages/container/${PACKAGE}" \
            -d '{"visibility":"public"}' || echo "::warning::Could not set package visibility — check org settings"
