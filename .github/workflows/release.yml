name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        profile:
          - name: default
            suffix: ""
          - name: minimal
            suffix: "-minimal"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download conctl binary
        run: |
          curl -fsSL \
            https://github.com/ConspiracyOS/conctl/releases/latest/download/conctl-linux-${{ matrix.arch }} \
            -o conctl
          chmod +x conctl

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (per-arch)
        run: |
          TAG="${GITHUB_REF_NAME}"
          IMAGE="ghcr.io/conspiracyos/conos${{ matrix.profile.suffix }}"

          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --build-arg BASE_IMAGE=ubuntu:24.04 \
            --build-arg PROFILE=${{ matrix.profile.name }} \
            -t "${IMAGE}:${TAG}-${{ matrix.arch }}" \
            --push \
            -f Containerfile \
            .

  manifest:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile:
          - name: default
            suffix: ""
          - name: minimal
            suffix: "-minimal"
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          IMAGE="ghcr.io/conspiracyos/conos${{ matrix.profile.suffix }}"

          docker manifest create "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"
          docker manifest push "${IMAGE}:${TAG}"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"
          docker manifest push "${IMAGE}:latest"
