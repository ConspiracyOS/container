id: CON-SYS-002
description: Memory available must remain above threshold
type: detective
tags: [schedule]
scope: global
checks:
  - name: memory_available_percentage
    command:
      run: "result=$(free | awk '/^Mem:/ {printf \"%.0f\", $7/$2 * 100}'); [ \"$result\" -ge 10 ]"
      exit_code: 0
    on_fail: halt_agents
    severity: critical
    category: system
    what: "Available memory below 10% threshold"
    verify: "free -h"
    affects: ["system memory"]
