id: CON-AGENT-001
description: All agent directories must have correct permissions and ownership
type: detective
tags: [schedule]
scope: global
checks:
  - name: agent_dir_permissions
    script:
      path: scripts/check-agent-perms.sh
      timeout: 10s
    on_fail: alert
    severity: high
    category: agents
    what: "Agent directory has incorrect permissions or ownership"
    verify: "ls -la /srv/conos/agents/"
    affects: ["/srv/conos/agents"]
