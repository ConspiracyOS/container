id: CON-SYS-007
description: Linux audit logging service must be active
type: detective
tags: [schedule]
scope: global
checks:
  - name: auditd_active
    command:
      # Skip in environments where auditd is unavailable (containers, local_trusted).
      # auditctl -s will fail if the audit subsystem isn't in the kernel.
      run: "command -v auditctl >/dev/null 2>&1 || exit 0; systemctl is-active --quiet auditd && auditctl -s >/dev/null"
      exit_code: 0
    on_fail: alert
    severity: high
    category: security
    what: auditd is not active or audit subsystem is unavailable
    verify: "systemctl status auditd --no-pager && auditctl -s"
    affects: ["/var/log/audit", "audit pipeline"]
