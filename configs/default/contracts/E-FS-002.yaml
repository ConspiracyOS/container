id: E-FS-002
description: Agent cannot overwrite its own AGENTS.md (root-owned, not agent-writable)
type: enforcement
tags: [enforcement]
scope: global
checks:
  - name: agents-md-overwrite-blocked
    script:
      inline: |
        # Preflight: confirm su works
        su -s /bin/sh a-concierge -c 'true' 2>/dev/null \
          || { echo "su preflight failed for a-concierge"; exit 2; }

        # Preflight: confirm AGENTS.md exists and is root-owned
        AGENTS_FILE="/home/a-concierge/AGENTS.md"
        [ -f "$AGENTS_FILE" ] \
          || { echo "SKIP: $AGENTS_FILE does not exist — cannot test overwrite"; exit 2; }

        # Attempt: concierge tries to append to its own AGENTS.md
        RESULT=$(su -s /bin/sh a-concierge -c \
          "echo 'injected' >> \"$AGENTS_FILE\"" 2>&1)
        echo "$RESULT" | grep -q 'Permission denied' \
          || { echo "FAIL: a-concierge could write to $AGENTS_FILE — file must be root-owned"; exit 1; }

        echo "PASS: AGENTS.md overwrite blocked (EACCES — root-owned)"
    on_fail: fail
    severity: critical
    category: enforcement
    what: "Agent can overwrite its own AGENTS.md — instruction injection vector open"
    verify: "stat -c '%a %U' /home/a-concierge/AGENTS.md"
    affects: ["/home/"]
