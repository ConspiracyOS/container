id: CON-SEC-001
description: Skills and agent instruction files must be owned by root
type: detective
tags: [schedule]
scope: global
checks:
  - name: skills_root_owned
    script:
      inline: |
        found=$(find /etc/conos/roles /etc/conos/agents -name '*.md' ! -user root 2>/dev/null)
        if [ -n "$found" ]; then
          echo "Non-root-owned skill files found:"
          echo "$found"
          exit 1
        fi
    on_fail: escalate
    severity: critical
    category: security
    what: "Skills or agent instruction files not owned by root"
    verify: "find /etc/conos/roles /etc/conos/agents -name '*.md' ! -user root"
    affects: ["/etc/conos/roles", "/etc/conos/agents"]
