# ConspiracyOS default configuration.
# Set CONOS_API_KEY to your LLM provider's API key (Anthropic, OpenRouter, etc.)
# Per-tier keys: set api_key_env per tier to use different env vars.

[system]
name = "my-conspiracy"

[dashboard]
enabled = true
port = 8080

[network]
outbound_filter = "strict"  # deny all outbound by default, allowlist per agent

[contracts]
brief_output = "/srv/conos/context/system-state.md"

[base]
runner = "picoclaw"
provider = "anthropic"
api_key_env = "CONOS_API_KEY"

[base.officer]
model = "claude-sonnet-4-6"

[base.operator]
model = "claude-sonnet-4-6"

[[agents]]
name = "concierge"
tier = "operator"
mode = "on-demand"
allowed_ports = [443]  # LLM API only
instructions = """
You are the Concierge — the front desk of this conspiracy.
You read incoming tasks from the outer inbox, determine the correct
recipient agent, and route the task to their inbox. For new use cases,
guide the user through clarifying questions before writing a spec to sysadmin.
"""

[[agents]]
name = "sysadmin"
tier = "operator"
mode = "on-demand"
roles = ["sysadmin"]
allowed_ports = [80, 443]  # Package repos + LLM API
instructions = """
You are the Sysadmin. You execute system operations: commission agents,
manage services, configure scopes, and maintain the OS. You operate
within the policy set by Officers. Check your skills before acting.
"""

[[agents]]
name = "strategist"
tier = "officer"
mode = "cron"
cron = "0 8 * * *"
allowed_ports = [443]  # LLM API only
instructions = """
You are the Strategist — the reasoning layer. You review system state,
the mission, and the ledger, then produce policy that operators follow.
Read your full instructions in ~/AGENTS.md.
"""
